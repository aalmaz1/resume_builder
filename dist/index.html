<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretext Resume Builder | KNU Project</title>
    
    <!-- Google Fonts - 3 Typography Systems for A/B Testing -->
    <!-- System A: Professional (Merriweather + Inter) - Strict, Business -->
    <!-- System B: Friendly (Poppins + Open Sans) - Modern, Creative -->
    <!-- System C: Neutral (System Fonts) - Universal, Fastest -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Merriweather:wght@400;700;900&family=Open+Sans:wght@400;600;700&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    
    
    <!-- Print Styles - Critical for PDF Export -->
    <style id="print-styles">
        @media print {
            @page {
                margin: 0;
                size: A4;
            }
            @page:first {
                margin: 0;
            }
            @page:left {
                margin: 0;
            }
            @page:right {
                margin: 0;
            }
            body {
                background: white !important;
                color: black !important;
                margin: 0;
                padding: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                -webkit-margin-before: 0;
                -webkit-margin-after: 0;
            }
            .controls-bar, #loading-overlay, .no-print {
                display: none !important;
            }
            #resume-container {
                box-shadow: none !important;
                margin: 0 !important;
                padding: 15mm !important;
                width: 100% !important;
                max-width: none !important;
                border: none !important;
                background: white !important;
                color: black !important;
                position: static !important;
                float: none !important;
                clear: both !important;
                overflow: visible !important;
                height: auto !important;
            }
            /* Force text visibility */
            * {
                color: black !important;
                background: transparent !important;
            }
            a {
                text-decoration: underline;
                color: #000 !important;
            }
            /* Prevent page breaks inside sections */
            .resume-section, .entity-item, .section-block, .positioned-block {
                break-inside: avoid;
                page-break-inside: avoid;
            }
            h1, h2, h3 {
                page-break-after: avoid;
                margin-top: 0 !important;
            }
            /* Ensure content starts from top */
            html, body {
                height: auto !important;
                overflow: visible !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .resume-header {
                margin-top: 0 !important;
                padding-top: 0 !important;
                margin-bottom: 10px !important;
                break-inside: avoid;
            }
            h1, h2, .contact-line {
                overflow-wrap: break-word;
                word-wrap: break-word;
                hyphens: auto;
            }
        }
    </style>
  <script type="module" crossorigin src="/assets/index-DAyp4LHI.js"></script>
  <link rel="modulepreload" crossorigin href="/assets/rolldown-runtime-CNC7AqOf.js">
  <link rel="stylesheet" crossorigin href="/assets/index-Xz5Lu53L.css">
</head>
<body class="theme-classic">

    <div class="controls-bar" role="navigation" aria-label="Resume builder controls">
        <div class="theme-group">
            <span class="group-label" id="app-title">Resume Builder</span>
        </div>

        <div class="lang-group">
            <label for="lang-select" id="lang-label">Interface Language:</label>
            <select id="lang-select" class="lang-select" aria-label="Select interface language">
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="ko">한국어</option>
            </select>
        </div>

        <div class="design-group">
            <label for="design-select" class="group-label" data-i18n="resumeDesignLabel">Resume Design:</label>
            <select id="design-select" class="design-select" aria-label="Select resume theme">
                <!-- Designs will be populated dynamically from design-templates.ts -->
            </select>
            <button id="random-design-btn" class="random-design-btn" title="Random Design">🎲 Random</button>
        </div>

        <div class="align-group">
            <span class="group-label" data-i18n="alignmentLabel">Alignment:</span>
            <button class="align-btn active" data-align="left" title="Left">⬅ <span data-i18n="alignLeft">Left</span></button>
            <button class="align-btn" data-align="center" title="Center">↔ <span data-i18n="alignCenter">Center</span></button>
            <button class="align-btn" data-align="justify" title="Justify">≡ <span data-i18n="alignJustify">Justify</span></button>
        </div>

        <div class="import-group" role="search">
            <label for="github-url" class="visually-hidden">GitHub username</label>
            <input type="text" id="github-url" placeholder="GitHub username (e.g. torvalds)" aria-label="GitHub username">
            <button id="import-github" aria-label="Import from GitHub">Import</button>
            <div id="loader" aria-live="polite"></div>
        </div>

        <div class="action-group" role="group" aria-label="Export and analysis actions">
            <button id="save-json" aria-label="Сохранить JSON">Сохранить JSON</button>
            <button id="export-pdf" aria-label="Экспорт в PDF">Экспорт в PDF</button>
            <button id="ats-check" class="ats-tooltip-container" aria-label="Проверить ATS совместимость">
                📊 ATS Check
                <span class="ats-tooltip-icon" title="What is ATS?" role="button" tabindex="0">ⓘ</span>
                <span class="ats-tooltip" id="ats-tooltip-text"></span>
            </button>
        </div>
    </div>

    <!-- Theme Toggle Button - Bottom Left Corner -->
    <button id="theme-toggle-floating" class="theme-toggle-floating" title="Toggle theme" aria-label="Переключить тему">🌙</button>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <span>Loading GitHub data...</span>
    </div>

    <!-- Editable hint toast -->
    <div id="editable-hint" class="editable-hint"></div>

    <!-- Main content area with side-by-side layout -->
    <div class="main-content-wrapper">
        <main id="resume-container" contenteditable="true" spellcheck="false" role="main" aria-label="Resume preview"></main>
        
        <!-- ATS Panel - Sticky sidebar -->
        <aside id="ats-panel" class="ats-panel hidden" aria-label="ATS analysis panel">
            <div class="ats-panel-content"></div>
        </aside>
    </div>

</body>
</html>

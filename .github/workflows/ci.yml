name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npm run typecheck

      - name: Unit Test
        run: npm run test

      - name: Build
        run: npm run build

      # 1. Validate ATS on Golden Dataset (synthetic resumes)
      - name: Validate ATS on Golden Dataset
        run: npx tsx scripts/validate-ats-quality.ts
        continue-on-error: false

      # 2. Upload Golden Dataset Report as artifact
      - name: Upload Golden Dataset Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-dataset-report
          path: reports/golden-report.json
          retention-days: 7

      # 3. Validate ATS on Real-World Data (only for main/master)
      - name: Validate ATS on Real-World Data
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: npx tsx scripts/real-world-validation.ts
        continue-on-error: false

      # 4. Check ATS Quality Metrics (correlation > 0.8, MAE < 8)
      - name: Check ATS Quality Metrics
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
        run: |
          CORRELATION=$(jq '.correlation' reports/metrics.json)
          MAE=$(jq '.mae' reports/metrics.json)
          echo "Correlation: $CORRELATION"
          echo "MAE: $MAE"
          if (( $(echo "$CORRELATION < 0.8" | bc -l) )); then
            echo "❌ Correlation ($CORRELATION) is below 0.8"
            exit 1
          fi
          if (( $(echo "$MAE > 8" | bc -l) )); then
            echo "❌ MAE ($MAE) is above 8"
            exit 1
          fi
          echo "✅ All ATS metrics are within acceptable ranges"
        continue-on-error: false

      # 5. Upload Real-World Validation Report as artifact
      - name: Upload Real-World Validation Report
        if: always() && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
        uses: actions/upload-artifact@v4
        with:
          name: real-world-validation-report
          path: reports/real-world-report.json
          retention-days: 30

      # 6. Generate coverage report
      - name: Generate coverage report
        run: npm run coverage -- --reporter=json-summary --reporter=text
        
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage/coverage-summary.json
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

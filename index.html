<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretext Resume Builder | KNU Project</title>
    <link rel="stylesheet" href="/src/styles.css">
    
    <!-- Print Styles - Critical for PDF Export -->
    <style id="print-styles">
        @media print {
            @page {
                margin: 0;
                size: A4;
            }
            @page:first {
                margin: 0;
            }
            @page:left {
                margin: 0;
            }
            @page:right {
                margin: 0;
            }
            body {
                background: white !important;
                color: black !important;
                margin: 0;
                padding: 0;
                -webkit-print-color-adjust: exact;
                print-color-adjust: exact;
                -webkit-margin-before: 0;
                -webkit-margin-after: 0;
            }
            .controls-bar, #loading-overlay, .no-print {
                display: none !important;
            }
            #resume-container {
                box-shadow: none !important;
                margin: 0 !important;
                padding: 15mm !important;
                width: 100% !important;
                max-width: none !important;
                border: none !important;
                background: white !important;
                color: black !important;
                position: static !important;
                float: none !important;
                clear: both !important;
                overflow: visible !important;
                height: auto !important;
            }
            /* Force text visibility */
            * {
                color: black !important;
                background: transparent !important;
            }
            a {
                text-decoration: underline;
                color: #000 !important;
            }
            /* Prevent page breaks inside sections */
            .resume-section, .entity-item, .section-block, .positioned-block {
                break-inside: avoid;
                page-break-inside: avoid;
            }
            h1, h2, h3 {
                page-break-after: avoid;
                margin-top: 0 !important;
            }
            /* Ensure content starts from top */
            html, body {
                height: auto !important;
                overflow: visible !important;
                margin: 0 !important;
                padding: 0 !important;
            }
            .resume-header {
                margin-top: 0 !important;
                padding-top: 0 !important;
                margin-bottom: 10px !important;
                break-inside: avoid;
            }
            h1, h2, .contact-line {
                overflow-wrap: break-word;
                word-wrap: break-word;
                hyphens: auto;
            }
        }
    </style>
</head>
<body class="theme-classic">

    <div class="controls-bar">
        <div class="theme-group">
            <span class="group-label" id="app-title">Resume Builder</span>
        </div>

        <div class="lang-group">
            <label for="lang-select" id="lang-label">Interface Language:</label>
            <select id="lang-select" class="lang-select">
                <option value="en">English</option>
                <option value="ru">Русский</option>
                <option value="ko">한국어</option>
            </select>
        </div>

        <div class="design-group">
            <span class="group-label" data-i18n="resumeDesignLabel">Resume Design:</span>
            <button class="design-btn active" data-design="classic">Classic</button>
            <button class="design-btn" data-design="modern">Modern</button>
            <button class="design-btn" data-design="minimal">Minimal</button>
        </div>

        <div class="align-group">
            <span class="group-label" data-i18n="alignmentLabel">Alignment:</span>
            <button class="align-btn active" data-align="left" title="Left">⬅ <span data-i18n="alignLeft">Left</span></button>
            <button class="align-btn" data-align="center" title="Center">↔ <span data-i18n="alignCenter">Center</span></button>
            <button class="align-btn" data-align="justify" title="Justify">≡ <span data-i18n="alignJustify">Justify</span></button>
        </div>

        <div class="import-group">
            <input type="text" id="github-url" placeholder="GitHub username (e.g. torvalds)">
            <button id="import-github">Import</button>
            <div id="loader"></div>
        </div>

        <div class="action-group">
            <button id="save-json">Save JSON</button>
            <button id="export-pdf">Export PDF</button>
        </div>
    </div>

    <!-- Theme Toggle Button - Bottom Left Corner -->
    <button id="theme-toggle-floating" class="theme-toggle-floating" title="Toggle theme">🌙</button>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <span>Loading GitHub data...</span>
    </div>

    <!-- Editable hint toast -->
    <div id="editable-hint" class="editable-hint"></div>

    <div id="resume-container" contenteditable="true" spellcheck="false"></div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>

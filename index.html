<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pretext Resume Builder | KNU Project</title>
    <link rel="stylesheet" href="/src/styles.css">
</head>
<body class="theme-classic">

    <div class="controls-bar">
        <div class="theme-group">
            <button class="theme-btn active" data-theme="classic">Classic</button>
            <button class="theme-btn" data-theme="modern">Modern</button>
            <button class="theme-btn" data-theme="minimal">Minimal</button>
        </div>

        <div class="import-group">
            <input type="text" id="github-url" placeholder="GitHub username (e.g. torvalds)">
            <button id="import-github">Import</button>
            <div id="loader"></div>
        </div>

        <div class="action-group">
            <button id="save-json">Save JSON</button>
            <button id="export-pdf">Export PDF</button>
        </div>
    </div>

    <div id="loading-overlay" class="hidden">
        <div class="spinner"></div>
        <span>Loading GitHub data...</span>
    </div>

    <div id="resume-container" contenteditable="true" spellcheck="false"></div>

    <script type="module" src="/src/main.ts"></script>
</body>
</html>
